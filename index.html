<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourBox 智能助手</title>
    <style>
        :root { --tb-orange: #FF6B35; --bg-color: #f9fafb; --chat-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 聊天容器 */
        .chat-container { width: 100%; max-width: 480px; height: 90vh; background: var(--chat-bg); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        
        /* 消息列表区 */
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; }
        .msg.user { align-self: flex-end; background: var(--tb-orange); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
        .msg.ai a { color: var(--tb-orange); text-decoration: underline; }
        
        /* 输入区 */
        .input-area { padding: 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--tb-orange); }
        button { padding: 0 24px; background: var(--tb-orange); color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* 加载动画 */
        .typing::after { content: '...'; animation: blink 1.4s infinite both; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="msg ai">你好！我是 TourBox 官方智能助手，请问有什么可以帮您？</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入问题，如：指哪调哪怎么设置？" autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

<script>
    // ⚠️ 配置区：替换为你的真实 API 信息
    const DIFY_API_URL = 'https://api.dify.ai/v1/chat-messages'; 
    const DIFY_API_KEY = 'app-51TMeNX1Jwh310mZ3Erw9JVF'; 

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let conversationId = ''; // Dify 多轮对话 ID

    // 自动将文本中的 URL 转换为可点击链接
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        // 1. 渲染用户消息
        messagesDiv.innerHTML += `<div class="msg user">${query}</div>`;
        userInput.value = '';
        sendBtn.disabled = true;

        // 2. 创建 AI 占位消息
        const aiMsgId = 'ai-' + Date.now();
        messagesDiv.innerHTML += `<div class="msg ai typing" id="${aiMsgId}"></div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            // 3. 调用 Dify SSE 流式接口
const response = await fetch('https://api.dify.ai/v1/chat-messages', {
    method: 'POST',
    headers: {
        'Authorization': 'Bearer app-51TMeNX1Jwh310mZ3Erw9JVF',
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({
        inputs: {},
        query: '你好',
        response_mode: 'blocking',
        user: 'user-001'
    })
});
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                // 解析 SSE data 格式
                const lines = chunk.split('\n').filter(line => line.startsWith('data:'));
                for (const line of lines) {
                    try {
                        const json = JSON.parse(line.substring(5));
                        if (json.answer) {
                            fullText += json.answer;
                            document.getElementById(aiMsgId).innerHTML = linkify(fullText);
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }
                        if (json.conversation_id) conversationId = json.conversation_id;
                    } catch (e) { /* 忽略非 JSON 行 */ }
                }
            }
            // 移除打字机样式
            document.getElementById(aiMsgId).classList.remove('typing');
        } catch (error) {
            document.getElementById(aiMsgId).innerText = '网络异常，请稍后重试';
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
