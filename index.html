<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourBox 智能助手</title>
    <style>
        :root { --tb-orange: #FF6B35; --bg-color: #f9fafb; --chat-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 90vh; background: var(--chat-bg); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; }
        .msg.user { align-self: flex-end; background: var(--tb-orange); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
        .msg.ai a { color: var(--tb-orange); text-decoration: underline; }
        .input-area { padding: 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--tb-orange); }
        button { padding: 0 24px; background: var(--tb-orange); color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing::after { content: '...'; animation: blink 1.4s infinite both; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
   <script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 模拟回复库（你可以自己改内容）
    const mockReplies = [
        '感谢您的提问！TourBox 支持指哪调哪功能，您可以在驱动软件中自定义按键映射。',
        '关于您的问题，建议您先检查 USB 连接是否稳定，然后重启驱动软件。',
        'TourBox 的快捷预设功能可以让您一键切换不同软件的配置，非常方便！',
        '如果您遇到驱动识别问题，请尝试更换 USB 接口或重新安装驱动。',
        'TourBox 支持 Win 和 Mac 双平台，您可以放心使用。'
    ];

    function getRandomReply() {
        return mockReplies[Math.floor(Math.random() * mockReplies.length)];
    }

    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    }

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        // 显示用户消息
        messagesDiv.innerHTML += `<div class="msg user">${query}</div>`;
        userInput.value = '';
        sendBtn.disabled = true;

        // 创建 AI 占位消息
        const aiMsgId = 'ai-' + Date.now();
        messagesDiv.innerHTML += `<div class="msg ai typing" id="${aiMsgId}"></div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // 模拟延迟（让回复感觉像真的在思考）
        await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 600));

        // 显示模拟回复
        const reply = getRandomReply();
        document.getElementById(aiMsgId).innerHTML = linkify(reply);
        document.getElementById(aiMsgId).classList.remove('typing');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        sendBtn.disabled = false;
        userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
