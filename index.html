<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourBox 智能助手</title>
    <style>
        :root { --tb-orange: #FF6B35; --bg-color: #f9fafb; --chat-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 90vh; background: var(--chat-bg); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; }
        .msg.user { align-self: flex-end; background: var(--tb-orange); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
        .msg.ai a { color: var(--tb-orange); text-decoration: underline; }
        .input-area { padding: 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--tb-orange); }
        button { padding: 0 24px; background: var(--tb-orange); color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing::after { content: '...'; animation: blink 1.4s infinite both; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>

</head>
<body>
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="msg ai">你好！我是 TourBox 官方智能助手，请问有什么可以帮您？</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入问题，如：指哪调哪怎么设置？" autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

<script>
    const DIFY_API_URL = 'https://api.dify.ai/v1/chat-messages';
    const DIFY_API_KEY = 'app-9lEt4pd9j9ZTO5ImW1aiELLg';

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let conversationId = '';

    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    }

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        messagesDiv.innerHTML += `<div class="msg user">${query}</div>`;
        userInput.value = '';
        sendBtn.disabled = true;

        const aiMsgId = 'ai-' + Date.now();
        messagesDiv.innerHTML += `<div class="msg ai typing" id="${aiMsgId}"></div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            // ✅ 这是标准的 fetch 写法，绝对没有语法错误
            const response = await fetch(DIFY_API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${DIFY_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    inputs: {},
                    query: query,
                    response_mode: 'streaming',
                    user: 'user-001',
                    conversation_id: conversationId
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n').filter(line => line.startsWith('data:'));
                for (const line of lines) {
                    try {
                        const json = JSON.parse(line.substring(5).trim());
                        if (json.answer) {
                            fullText += json.answer;
                            document.getElementById(aiMsgId).innerHTML = linkify(fullText);
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }
                        if (json.conversation_id) {
                            conversationId = json.conversation_id;
                        }
                    } catch (e) {}
                }
            }
            document.getElementById(aiMsgId).classList.remove('typing');
        } catch (error) {
            document.getElementById(aiMsgId).innerText = '⚠️ ' + error.message;
            document.getElementById(aiMsgId).classList.remove('typing');
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
